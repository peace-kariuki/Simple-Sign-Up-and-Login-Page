<!DOCTYPE html>
<html>
<head>
<style>

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color:#f2f2f2;
  font-family:Arial, sans-serif;
}

.card{
  width:300px;
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.profile-img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
}

.status{
  display:inline-block;
  margin-top:10px;
  background:green;
  color:white;
  padding:6px 14px;
  border-radius:20px;
  font-size:14px;
}

button{
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background-color:blue;
  color:white;
  cursor:pointer;
}

button:hover{
  background-color:darkblue;
}

</style>
</head>

<body>

<div class="card">
  <img src="yourphoto.jpg" class="profile-img">
  <h2>Peace Kariuki</h2>
  <p>Student ID: 1023</p>
  <p>📧 peace@email.com</p>
  <p>📱 0712345678</p>
  <span class="status">Active</span>
  <br>
  <button>View Profile</button>
</div>

</body>
</html>
