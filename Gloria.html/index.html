<!DOCTYPE html>
<html>
<head>
<title>Thank You Sumba</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* Card */
.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

/* Message */
.message{
    font-size:40px;
    color:#ff4d6d;
    font-weight:bold;
}

/* Button */
button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1e4d;
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-50px;
    font-size:25px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{
        transform: translateY(0);
        opacity:1;
    }
    100%{
        transform: translateY(-100vh);
        opacity:0;
    }
}

/* Different heart positions */
.heart:nth-child(1){ left:10%; animation-duration:6s;}
.heart:nth-child(2){ left:25%; animation-duration:8s;}
.heart:nth-child(3){ left:40%; animation-duration:7s;}
.heart:nth-child(4){ left:60%; animation-duration:9s;}
.heart:nth-child(5){ left:80%; animation-duration:6s;}

</style>
</head>

<body>

<div class="card">
<h1 class="message">❤️ Thank You Sumba ❤️</h1>
<p>You are truly appreciated!</p>
<button>Send Love</button>
</div>

<!-- Floating Hearts -->
<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>
<div class="heart">❤️</div>

</body>
</html>
